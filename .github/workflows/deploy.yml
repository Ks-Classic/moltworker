name: Deploy OpenClaw

on:
  # CI ワークフロー (ci.yml) が main branch で成功した場合のみデプロイ
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # CI ワークフローが成功した場合、または手動実行の場合のみデプロイ
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build canonical OpenClaw config
        run: npm run config:build

      # Step 1: 設定ファイルを R2 にアップロード
      - name: Upload configs to R2
        run: |
          # Upload openclaw.json
          npx wrangler r2 object put "openclaw-data/openclaw/openclaw.json" \
            --file openclaw/openclaw.json --remote

          # Upload canonical source config
          npx wrangler r2 object put "openclaw-data/openclaw/openclaw.source.json" \
            --file config/openclaw.source.json --remote

          # Upload all agent config files
          for agent_dir in openclaw/agents/*/agent; do
            agent_name=$(basename $(dirname "$agent_dir"))
            for f in "$agent_dir"/*.md; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              echo "Uploading $agent_name/$fname..."
              npx wrangler r2 object put \
                "openclaw-data/openclaw/agents/$agent_name/agent/$fname" \
                --file "$f" --remote
            done
          done

          echo "✅ Config upload complete"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Step 2: ビルド＆デプロイ
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          packageManager: npm
